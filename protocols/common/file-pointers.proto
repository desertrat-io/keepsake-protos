syntax = "proto3";
package io.desertrat.keepsake.common;
option java_package = "io.desertrat.keepsake.protocols";
option php_namespace = "Keepsake\\Lib\\Protocols";

message FilePointers {
  string file_name = 2;
  string file_mime = 3;
  string file_final_location = 4;
  uint32 page_num = 5;
  uint32 page_file_size = 6;
  // as a UUID
  uint64 parent_image_id = 7;
}